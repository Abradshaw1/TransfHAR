<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TransfHAR Live Demo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fff; color: #18181b; min-height: 100vh;
  }

  /* ── Two-column grid: 1fr 3fr ── */
  .layout {
    max-width: 2000px; margin: 0 auto;
    padding: 40px 40px;
    display: grid;
    grid-template-columns: 1fr 3fr;
    gap: 64px;
    align-items: start;
  }

  /* ── Left column ── */
  .left { text-align: center; }

  .pred-title { font-size: 28px; color: #2563eb; margin-bottom: 8px; }
  .pred-label {
    font-size: 100px; font-weight: 800; text-transform: uppercase;
    line-height: 1; letter-spacing: -0.03em; color: #18181b;
    margin-bottom: 4px;
  }
  .pred-conf { font-size: 24px; color: #71717a; margin-bottom: 32px; }

  .class-list { margin: 0 auto; max-width: 280px; }
  .class-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 4px 16px; font-size: 20px;
  }
  .class-name { font-weight: 400; color: #3f3f46; }
  .class-pct { font-weight: 500; color: #3f3f46; }

  /* ── Watch ── */
  .watch {
    position: relative;
    width: 260px; margin: 40px auto 0;
    border: 5px solid #d4d4d8;
    border-radius: 48px;
    background: #000; overflow: hidden;
    padding: 20px 16px 16px;
  }
  .watch-crown {
    position: absolute; right: -10px; top: 24px;
    width: 10px; height: 40px; border-radius: 5px;
    background: #3b82f6;
  }
  .watch-title {
    text-align: center; font-size: 16px; font-weight: 500;
    color: #fff; margin-bottom: 12px;
  }
  .watch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .wbtn {
    display: flex; align-items: center; justify-content: center;
    padding: 18px 8px; border: none; border-radius: 16px;
    font-family: inherit; font-size: 13px; font-weight: 700;
    color: #fff; cursor: pointer; text-align: center;
    line-height: 1.2; transition: filter 0.15s;
  }
  .wbtn:hover { filter: brightness(1.1); }
  .wbtn:active { filter: brightness(0.9); }
  .wbtn-green { background: #22c55e; }
  .wbtn-red { background: #ef4444; }
  .wbtn-blue { background: #60a5fa; }
  .wbtn-yellow { background: #facc15; color: #18181b; }

  .watch-input {
    width: 100%; margin-top: 10px; padding: 7px 10px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; color: #fff; font-size: 11px; outline: none;
    font-family: inherit;
  }
  .watch-input::placeholder { color: rgba(255,255,255,0.3); }
  .watch-input:focus { border-color: #3b82f6; }
  .watch-status {
    font-size: 10px; color: rgba(255,255,255,0.35);
    text-align: center; margin-top: 6px; min-height: 14px;
  }
  .watch-status.error { color: #ef4444; }
  .watch-tags {
    display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; margin-top: 4px;
  }
  .watch-tag {
    font-size: 9px; padding: 2px 6px; border-radius: 6px;
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5);
  }

  /* ── Right column: charts ── */
  .right { }
  .section-title { font-size: 28px; font-weight: 600; color: #27272a; margin-bottom: 8px; }
  .section-title.gyro { margin-top: 32px; }

  .sig-row {
    display: grid;
    grid-template-columns: 40px 1fr;
    align-items: center;
    min-height: 100px;
  }
  .sig-label { font-size: 22px; font-weight: 600; padding-left: 4px; }
  .sig-canvas { width: 100%; height: 90px; display: block; }
</style>
</head>
<body>
<div class="layout">

  <!-- LEFT -->
  <div class="left">
    <div class="pred-title">Predictions</div>
    <div class="pred-label" id="predLabel">--</div>
    <div class="pred-conf" id="predConf">--</div>

    <div class="class-list" id="classList">
      <div class="class-row"><span class="class-name">--</span><span class="class-pct">--%</span></div>
      <div class="class-row"><span class="class-name">--</span><span class="class-pct">--%</span></div>
      <div class="class-row"><span class="class-name">--</span><span class="class-pct">--%</span></div>
      <div class="class-row"><span class="class-name">--</span><span class="class-pct">--%</span></div>
    </div>

    <div class="watch">
      <div class="watch-crown"></div>
      <div class="watch-title">Controls</div>
      <div class="watch-grid">
        <button class="wbtn wbtn-green" id="btnRec">Record Activity</button>
        <button class="wbtn wbtn-red" id="btnStop">Stop Recording</button>
        <button class="wbtn wbtn-blue" id="btnTrain">Train Model</button>
        <button class="wbtn wbtn-yellow" id="btnAdd">Add Activity +</button>
      </div>
      <input type="text" class="watch-input" id="labelIn" placeholder="Activity name..." autocomplete="off" />
      <div id="statusMsg" class="watch-status"></div>
      <div id="tags" class="watch-tags"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="section-title">Accelerometer</div>
    <div class="sig-row">
      <div class="sig-label" style="color:#2563eb">X</div>
      <canvas class="sig-canvas" id="cvAX"></canvas>
    </div>
    <div class="sig-row">
      <div class="sig-label" style="color:#2563eb">Y</div>
      <canvas class="sig-canvas" id="cvAY"></canvas>
    </div>
    <div class="sig-row">
      <div class="sig-label" style="color:#2563eb">Z</div>
      <canvas class="sig-canvas" id="cvAZ"></canvas>
    </div>

    <div class="section-title gyro">Gyroscope</div>
    <div class="sig-row">
      <div class="sig-label" style="color:#ea580c">X</div>
      <canvas class="sig-canvas" id="cvGX"></canvas>
    </div>
    <div class="sig-row">
      <div class="sig-label" style="color:#ea580c">Y</div>
      <canvas class="sig-canvas" id="cvGY"></canvas>
    </div>
    <div class="sig-row">
      <div class="sig-label" style="color:#ea580c">Z</div>
      <canvas class="sig-canvas" id="cvGZ"></canvas>
    </div>
  </div>

</div>

<script>
const socket = io();
const $ = id => document.getElementById(id);

const cvMap = {
  acc_x: $('cvAX'), acc_y: $('cvAY'), acc_z: $('cvAZ'),
  gyro_x: $('cvGX'), gyro_y: $('cvGY'), gyro_z: $('cvGZ'),
};
const cvColor = {
  acc_x:'#2563eb', acc_y:'#2563eb', acc_z:'#2563eb',
  gyro_x:'#ea580c', gyro_y:'#ea580c', gyro_z:'#ea580c',
};

let didResize = false;
function resizeAll() {
  Object.values(cvMap).forEach(c => {
    const r = c.getBoundingClientRect();
    if (r.width > 0 && r.height > 0) {
      c.width = r.width * devicePixelRatio;
      c.height = r.height * devicePixelRatio;
      didResize = true;
    }
  });
}
window.addEventListener('resize', resizeAll);
setTimeout(resizeAll, 50);
setTimeout(resizeAll, 300);

function drawSig(key, data) {
  const cv = cvMap[key]; if (!cv || !data || !data.length) return;
  if (!didResize) resizeAll();
  const ctx = cv.getContext('2d'), W = cv.width, H = cv.height;
  if (W === 0 || H === 0) return;
  ctx.clearRect(0, 0, W, H);
  let mn = Infinity, mx = -Infinity;
  for (const v of data) { if (v < mn) mn = v; if (v > mx) mx = v; }
  const rng = (mx - mn) || 1, pad = 0.12 * rng; mn -= pad; mx += pad;
  ctx.strokeStyle = cvColor[key];
  ctx.lineWidth = 2.5 * devicePixelRatio;
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.beginPath();
  for (let i = 0; i < data.length; i++) {
    const x = (i / (data.length - 1)) * W;
    const y = H - ((data[i] - mn) / (mx - mn)) * H;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();
}

function renderPredictions(preds) {
  if (!preds || preds.length === 0) return;
  const top = preds[0];
  $('predLabel').textContent = top.label.toUpperCase();
  $('predConf').textContent = (top.confidence * 100).toFixed(0) + '% confidence';
  let html = '';
  for (const p of preds) {
    html += `<div class="class-row"><span class="class-name">${p.label}</span><span class="class-pct">${(p.confidence*100).toFixed(0)}%</span></div>`;
  }
  $('classList').innerHTML = html;
}

let currentMode = 'idle';

socket.on('update', d => {
  currentMode = d.mode || 'idle';
  renderPredictions(d.predictions || []);
  const sig = d.signals || {};
  for (const k of Object.keys(cvMap)) { if (sig[k]) drawSig(k, sig[k]); }
  const counts = d.recorded_counts || {};
  $('tags').innerHTML = Object.entries(counts)
    .map(([k,v]) => `<span class="watch-tag">${k}: ${v}</span>`).join('');
});

socket.on('status', d => {
  const el = $('statusMsg');
  el.textContent = d.msg || '';
  el.className = d.ok === false ? 'watch-status error' : 'watch-status';
});

$('btnRec').addEventListener('click', () => {
  const label = $('labelIn').value.trim();
  if (!label) { $('statusMsg').textContent = 'Enter activity name first'; $('statusMsg').className = 'watch-status error'; return; }
  socket.emit('start_record', { label });
});
$('btnStop').addEventListener('click', () => socket.emit('stop_record'));
$('btnTrain').addEventListener('click', () => {
  socket.emit('train');
  const onStatus = d => {
    if (d.msg && (d.msg.startsWith('Trained') || d.msg.startsWith('Need'))) {
      socket.off('status', onStatus);
      if (d.ok) setTimeout(() => socket.emit('start_infer'), 300);
    }
  };
  socket.on('status', onStatus);
});
$('btnAdd').addEventListener('click', () => {
  if (currentMode === 'infer') socket.emit('stop_infer');
  $('labelIn').value = ''; $('labelIn').focus();
  $('statusMsg').textContent = 'Enter activity name, then Record';
  $('statusMsg').className = 'watch-status';
});
$('labelIn').addEventListener('keydown', e => { if (e.key === 'Enter') $('btnRec').click(); });
</script>
</body>
</html>
