<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TransfHAR Live Demo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #fff; color: #18181b; min-height: 100vh;
  overflow: hidden;
}

.page {
  width: 1800px;
  min-height: 100vh;
  padding: 40px 40px;
  display: grid;
  grid-template-columns: 1fr 3fr;
  gap: 64px;
  align-items: center;
  transform-origin: top left;
}

.left { text-align: center; }
.pred-title { font-size: 28px; margin-bottom: 4px; }
.pred-label {
  font-size: 120px; font-weight: 400; text-transform: uppercase;
  line-height: 1.0; color: #18181b; margin-bottom: 0;
}
.pred-conf { font-size: 30px; color: #18181b; margin-bottom: 48px; }
.class-list { font-size: 36px; margin-bottom: 0; }
.class-row {
  display: flex; justify-content: space-between;
  padding: 6px 64px;
}
.class-name { color: #18181b; }
.class-pct { color: #18181b; }

/* ── Watch ── */
.watch-wrapper {
  position: relative;
  width: 400px; margin: 48px auto 0;
}
.watch {
  position: relative;
  width: 400px; height: 440px;
  border: 6px solid #d4d4d8;
  border-radius: 64px;
  background: #000; overflow: hidden;
  display: flex; flex-direction: column;
  padding: 24px 20px 20px;
}

/* ── Digital Crown: cylindrical barrel from the side ── */
.digital-crown {
  position: absolute;
  right: -15px; top: 85px;
  width: 16px; height: 48px;
  border-radius: 5px;
  background: linear-gradient(90deg, #9a9aa0 0%, #c8c8cc 20%, #e8e8ec 45%, #d4d4d8 65%, #a8a8b0 100%);
  border: 1px solid #8a8a90;
  box-shadow: 2px 0 4px rgba(0,0,0,0.2);
  z-index: 1;
  overflow: hidden;
}
/* horizontal grip ridges */
.digital-crown::after {
  content: '';
  position: absolute; top: 4px; left: 2px; right: 2px; bottom: 4px;
  border-radius: 2px;
  background: repeating-linear-gradient(
    180deg,
    transparent 0px, transparent 2.5px,
    rgba(0,0,0,0.15) 2.5px, rgba(0,0,0,0.15) 3.5px
  );
}

.watch-title {
  text-align: center; font-size: 26px; font-weight: 600;
  color: #fff; margin-bottom: 16px;
}
.watch-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  height: 180px;
}
.wbtn {
  display: flex; align-items: center; justify-content: center;
  border: none; border-radius: 16px;
  font-family: inherit; font-size: 19px; font-weight: 600;
  color: #fff; cursor: pointer; text-align: center;
  line-height: 1.3; transition: filter 0.15s;
}
.wbtn:hover { filter: brightness(1.1); }
.wbtn:active { filter: brightness(0.9); }
.wbtn-green { background: #22c55e; }
.wbtn-red { background: #ef4444; }
.wbtn-blue { background: #60a5fa; }
.wbtn-purple { background: #a855f6; }
.wbtn-purple.inferring { background: #ef4444; }
.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
  border-radius: 50%; animation: spin 0.6s linear infinite;
  margin-right: 4px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
.watch-input {
  width: 100%; margin-top: 12px; padding: 14px 16px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px; color: #fff; font-size: 25px; outline: none;
  font-family: inherit; flex-shrink: 0;
}
.watch-input::placeholder { color: rgba(255,255,255,0.3); }
.watch-input:focus { border-color: #3b82f6; }
.watch-status {
  font-size: 13px; color: rgba(255,255,255,0.4);
  text-align: center; margin-top: 6px; min-height: 18px; flex-shrink: 0;
}
.watch-status.error { color: #ef4444; }
.watch-tags {
  display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin-top: 4px; flex-shrink: 0;
}
.watch-tag {
  font-size: 12px; padding: 3px 8px; border-radius: 6px;
  background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5);
}

/* ── Right column: signal charts ── */
.section-title { font-size: 34px; font-weight: 600; color: #18181b; margin-bottom: 4px; }
.section-title.gyro { margin-top: 40px; }
.sig-row {
  display: grid;
  grid-template-columns: 120px 1fr;
  align-items: center;
  min-height: 180px;
}
.sig-label {
  font-size: 34px; font-weight: 600; color: #3f3f46;
  padding-left: 16px;
}
.sig-canvas { width: 100%; height: 160px; display: block; }
</style>
</head>
<body>
<div class="page">

  <!-- LEFT -->
  <div class="left">
    <div class="pred-title">Predictions</div>
    <div class="pred-label" id="predLabel">--</div>
    <div class="pred-conf" id="predConf">--</div>

    <div class="class-list" id="classList">
      <div class="class-row"><span class="class-name">--</span><span class="class-pct">--%</span></div>
      <div class="class-row"><span class="class-name">--</span><span class="class-pct">--%</span></div>
      <div class="class-row"><span class="class-name">--</span><span class="class-pct">--%</span></div>
      <div class="class-row"><span class="class-name">--</span><span class="class-pct">--%</span></div>
    </div>

    <div class="watch-wrapper">
      <div class="digital-crown"></div>
      <div class="watch">
        <div class="watch-title">Controls</div>
        <div class="watch-grid">
          <button class="wbtn wbtn-green" id="btnRec">Record Activity</button>
          <button class="wbtn wbtn-red" id="btnStop">Stop Recording</button>
          <button class="wbtn wbtn-blue" id="btnTrain">Train Model</button>
          <button class="wbtn wbtn-purple" id="btnInfer">Infer</button>
        </div>
        <input type="text" class="watch-input" id="labelIn" placeholder="Activity name..." autocomplete="off"/>
        <div id="statusMsg" class="watch-status"></div>
        <div id="tags" class="watch-tags"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="section-title">Accelerometer</div>
    <div class="sig-row">
      <div class="sig-label">X</div>
      <canvas class="sig-canvas" id="cvAX"></canvas>
    </div>
    <div class="sig-row">
      <div class="sig-label">Y</div>
      <canvas class="sig-canvas" id="cvAY"></canvas>
    </div>
    <div class="sig-row">
      <div class="sig-label">Z</div>
      <canvas class="sig-canvas" id="cvAZ"></canvas>
    </div>

    <div class="section-title gyro">Gyroscope</div>
    <div class="sig-row">
      <div class="sig-label">X</div>
      <canvas class="sig-canvas" id="cvGX"></canvas>
    </div>
    <div class="sig-row">
      <div class="sig-label">Y</div>
      <canvas class="sig-canvas" id="cvGY"></canvas>
    </div>
    <div class="sig-row">
      <div class="sig-label">Z</div>
      <canvas class="sig-canvas" id="cvGZ"></canvas>
    </div>
  </div>

</div>

<script>
const socket = io();
const $ = id => document.getElementById(id);

const cvMap = {
  acc_x: $('cvAX'), acc_y: $('cvAY'), acc_z: $('cvAZ'),
  gyro_x: $('cvGX'), gyro_y: $('cvGY'), gyro_z: $('cvGZ'),
};
const cvColor = {
  acc_x:'#2563eb', acc_y:'#2563eb', acc_z:'#2563eb',
  gyro_x:'#ea580c', gyro_y:'#ea580c', gyro_z:'#ea580c',
};

function resizeAll() {
  Object.values(cvMap).forEach(c => {
    const r = c.getBoundingClientRect();
    if (r.width > 0 && r.height > 0) {
      c.width = Math.round(r.width * devicePixelRatio);
      c.height = Math.round(r.height * devicePixelRatio);
    }
  });
}
window.addEventListener('resize', resizeAll);
setTimeout(resizeAll, 50);
setTimeout(resizeAll, 300);

const minRange = { acc_x:3, acc_y:3, acc_z:3, gyro_x:4, gyro_y:4, gyro_z:4 };
const DISPLAY_LEN = 100;
const LERP_RATE = 0.7;
const SCALE_RATE = 0.08;
const smoothScale = {};
for (const k of ['acc_x','acc_y','acc_z','gyro_x','gyro_y','gyro_z']) smoothScale[k] = { lo: 0, hi: 1 };

const displayBuf = {};
const targetBuf = {};
for (const k of Object.keys(cvMap)) {
  displayBuf[k] = new Float32Array(DISPLAY_LEN);
  targetBuf[k] = new Float32Array(DISPLAY_LEN);
}

function updateTargets(sig) {
  for (const k of Object.keys(cvMap)) {
    const arr = sig[k];
    if (!arr || !arr.length) continue;
    const t = targetBuf[k];
    if (arr.length >= DISPLAY_LEN) {
      for (let i = 0; i < DISPLAY_LEN; i++) t[i] = arr[arr.length - DISPLAY_LEN + i];
    } else {
      const shift = DISPLAY_LEN - arr.length;
      for (let i = 0; i < shift; i++) t[i] = t[i + arr.length] || 0;
      for (let i = 0; i < arr.length; i++) t[shift + i] = arr[i];
    }
  }
}

function lerpBuffers() {
  for (const k of Object.keys(cvMap)) {
    const d = displayBuf[k], t = targetBuf[k];
    for (let i = 0; i < DISPLAY_LEN; i++) d[i] += (t[i] - d[i]) * LERP_RATE;
  }
}

function drawSig(key) {
  const cv = cvMap[key]; if (!cv) return;
  const W = cv.width, H = cv.height;
  if (W === 0 || H === 0) { resizeAll(); return; }
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  const data = displayBuf[key];
  let dlo = Infinity, dhi = -Infinity;
  for (let i = 0; i < DISPLAY_LEN; i++) { if (data[i] < dlo) dlo = data[i]; if (data[i] > dhi) dhi = data[i]; }
  const mid = (dlo + dhi) / 2;
  const half = Math.max((dhi - dlo) / 2, (minRange[key] || 3) / 2);
  const tlo = mid - half * 1.15, thi = mid + half * 1.15;
  const s = smoothScale[key];
  s.lo += (tlo - s.lo) * SCALE_RATE;
  s.hi += (thi - s.hi) * SCALE_RATE;
  const mn = s.lo, mx = s.hi;
  ctx.strokeStyle = cvColor[key];
  ctx.lineWidth = 2.5 * devicePixelRatio;
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.beginPath();
  for (let i = 0; i < DISPLAY_LEN; i++) {
    const x = (i / (DISPLAY_LEN - 1)) * W;
    const y = H - ((data[i] - mn) / (mx - mn)) * H;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();
}

function renderFrame() {
  lerpBuffers();
  for (const k of Object.keys(cvMap)) drawSig(k);
  requestAnimationFrame(renderFrame);
}
requestAnimationFrame(renderFrame);

let knownClasses = [];
let currentMode = 'idle';
let inferring = false;

function renderClassList(preds) {
  if (knownClasses.length === 0) {
    $('classList').innerHTML = '<div class="class-row"><span class="class-name">--</span><span class="class-pct">--%</span></div>'.repeat(4);
    return;
  }
  let html = '';
  for (const cls of knownClasses) {
    const p = preds.find(x => x.label === cls);
    const pct = (inferring && p) ? (p.confidence * 100).toFixed(0) + '%' : '--%';
    html += `<div class="class-row"><span class="class-name">${cls}</span><span class="class-pct">${pct}</span></div>`;
  }
  $('classList').innerHTML = html;
}

function renderPredictions(preds) {
  if (inferring && preds && preds.length > 0) {
    const top = preds[0];
    $('predLabel').textContent = top.label;
    $('predConf').textContent = (top.confidence * 100).toFixed(0) + '% confidence';
  } else {
    $('predLabel').textContent = '--';
    $('predConf').textContent = '--';
  }
  renderClassList(preds || []);
}

function updateInferBtn() {
  const btn = $('btnInfer');
  if (inferring) {
    btn.textContent = 'Stop Inference';
    btn.classList.add('inferring');
  } else {
    btn.textContent = 'Infer';
    btn.classList.remove('inferring');
  }
}

socket.on('update', d => {
  currentMode = d.mode || 'idle';
  inferring = (currentMode === 'infer');
  updateInferBtn();
  renderPredictions(d.predictions || []);
  const sig = d.signals || {};
  updateTargets(sig);
  const counts = d.recorded_counts || {};
  knownClasses = Object.keys(counts).sort();
  $('tags').innerHTML = Object.entries(counts)
    .map(([k,v]) => `<span class="watch-tag">${k}: ${v}</span>`).join('');
});

socket.on('status', d => {
  const el = $('statusMsg');
  el.textContent = d.msg || '';
  el.className = d.ok === false ? 'watch-status error' : 'watch-status';
});

$('btnRec').addEventListener('click', () => {
  const label = $('labelIn').value.trim();
  if (!label) { $('statusMsg').textContent = 'Enter activity name first'; $('statusMsg').className = 'watch-status error'; return; }
  socket.emit('start_record', { label });
});
$('btnStop').addEventListener('click', () => socket.emit('stop_record'));
$('btnTrain').addEventListener('click', () => {
  const btn = $('btnTrain');
  btn.innerHTML = '<span class="spinner"></span>Training...';
  btn.style.pointerEvents = 'none';
  socket.emit('train');
  const onStatus = d => {
    if (d.msg && (d.msg.startsWith('Trained') || d.msg.startsWith('Need'))) {
      socket.off('status', onStatus);
      btn.textContent = 'Train Model';
      btn.style.pointerEvents = '';
    }
  };
  socket.on('status', onStatus);
});
$('btnInfer').addEventListener('click', () => {
  if (inferring) {
    socket.emit('stop_infer');
  } else {
    socket.emit('start_infer');
  }
});
$('labelIn').addEventListener('keydown', e => { if (e.key === 'Enter') $('btnRec').click(); });

/* ── Auto-scale: fit height, stretch width to fill ── */
function fitToScreen() {
  const page = document.querySelector('.page');
  page.style.width = '1800px';
  page.style.transform = '';
  const scale = Math.min(window.innerHeight / page.scrollHeight, 1);
  page.style.width = (window.innerWidth / scale) + 'px';
  page.style.transform = `scale(${scale})`;
  document.body.style.height = '100vh';
  setTimeout(resizeAll, 50);
}
window.addEventListener('resize', fitToScreen);
setTimeout(fitToScreen, 100);
setTimeout(fitToScreen, 500);
</script>
</body>
</html>
