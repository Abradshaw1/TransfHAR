splits:
  probe_dataset: prism
  probe_ratios: [0.7, 0.1, 0.2]  # train/val/test inside probe dataset
  probe_stratify_by_label: false    # only used when stratified_by_class is false (group-level splitting)

paths:
  dataset_path: "/shared/imu_lm/IMULM_master_dataset_v2.parquet"

probe:
  encoder_artifact_relpath: "artifacts/encoder.pt"
  encoder_meta_relpath: "artifacts/encoder_meta.json"
  probe_task: MakeCereal             # null = all labels; set to filter by task Prsim only: (['MakeCereal', 'MakeCoffee', 'MakeSandwich', 'MakeStencil', 'MakeTea', 'cooking', 'latte_making', 'skin_care'])
  drop_unknown: false
  min_count_per_class: 0
  fewshot_enabled: false
  fewshot_shots_per_class: 20 # single int: 1 shot = 1 window of data
  fewshot_seed: 0
  fewshot_probe_dirname: "UIST_fewshot_probe_prism_v2"  # output: run_dir/fewshot_probe_k{shots}/
  num_epochs: 1000000 # set high to converge by metric
  batch_size: 256
  lr: 0.0005
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  early_stop_patience: 40
  amp: true
  selection_metric: bal_acc
  class_weighted_loss: true
  log_every_steps: 5
  probe_dirname: "UIST_probe_prism_MakeCereal_vF"
  stratified_by_class: true        # true = split 0.7/0.1/0.2 within each class label (deterministic, per-class stratified)
  user_study_mode: false          # true = per-participant probe (splits within each participant)
  vocab_scaling: false             # true = pool all participants, train probes at C10, C20, ..., C_max
  vocab_scaling_step: 10          # classes added per step
  vocab_scaling_seed: 0           # seed for deterministic class ordering
